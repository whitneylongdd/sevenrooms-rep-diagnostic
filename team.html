<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 Rep Productivity Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a1a;display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
#sidebar{width:220px;min-width:180px;background:#1e2330;color:#c8cdd8;display:flex;flex-direction:column;overflow-y:auto;padding:0 0 16px 0;flex-shrink:0;}
#sidebar h2{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4a5568;padding:18px 14px 10px;border-bottom:1px solid #2a3045;}
.filter-group{padding:8px 14px 6px;}
.filter-label{font-size:10px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.pills-wrap{display:flex;flex-wrap:wrap;gap:3px;}
.pill{background:transparent;border:1px solid #2d3650;color:#8a9ab8;font-size:10px;padding:2px 7px;border-radius:10px;cursor:pointer;transition:all .15s;}
.pill:hover{border-color:#4a5a7a;color:#c8cdd8;background:#2a3045;}
.pill.active{background:#ff3008;border-color:#ff3008;color:#fff;font-weight:700;}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:#fff;border-bottom:1px solid #e8ecf2;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04);}
#topbar h1{font-size:15px;font-weight:800;color:#1e2330;margin-right:auto;letter-spacing:-.01em;}
.sort-btn{background:#f5f7fb;border:1px solid #e0e4ec;color:#555;font-size:11px;font-weight:700;padding:5px 13px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
.sort-btn.active{background:#1e2330;color:#fff;border-color:#1e2330;}
.period-pill{background:#f5f7fb;border:1px solid #e0e4ec;color:#555;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .15s;}
.period-pill.active{background:#ff3008;color:#fff;border-color:#ff3008;}
#toggle-btn{background:#fff;border:1px solid #e0e4ec;color:#1e2330;font-size:11px;font-weight:700;padding:5px 14px;border-radius:6px;cursor:pointer;transition:all .15s;}
#toggle-btn:hover{background:#f5f7fb;}
.sep{width:1px;background:#e8ecf2;height:22px;margin:0 2px;}
#count-label{font-size:11px;color:#aab;margin-left:2px;white-space:nowrap;}

/* ── Content / Grid ── */
#content{flex:1;overflow-y:auto;padding:16px;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}

/* ── Rep Cards ── */
.rcard{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);overflow:hidden;cursor:pointer;transition:box-shadow .18s,transform .12s;}
.rcard:hover{box-shadow:0 6px 20px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.06);transform:translateY(-2px);}
.card-header{background:linear-gradient(135deg,#1e2330 0%,#2a3352 100%);padding:11px 13px 10px;}
.card-top{display:flex;align-items:flex-start;gap:9px;}
.card-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff3008,#ff6b3d);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.02em;overflow:hidden;}
.card-avatar img{width:36px;height:36px;border-radius:50%;object-fit:cover;display:block;}
.card-geo-emoji{font-size:14px;line-height:1;flex-shrink:0;margin-left:auto;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px;line-height:1.3;}
.card-name-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-meta{font-size:10px;color:#7b8fb0;margin-top:2px;line-height:1.4;}
.fc-badge{background:#ff3008;color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;letter-spacing:.05em;flex-shrink:0;}
.card-kpis{display:flex;padding:8px 13px 6px;gap:6px;border-bottom:1px solid #f3f5f9;}
.kpi{flex:1;text-align:center;}
.kpi-val{font-size:19px;font-weight:800;color:#1e2330;letter-spacing:-.02em;line-height:1.1;}
.kpi-lbl{font-size:9px;color:#aab;margin-top:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.card-chart{padding:4px 10px 8px;background:#fafbfd;}
.detail-period-bar{display:flex;gap:6px;padding:12px 20px 0;}
.dp-pill{background:#f5f7fb;border:1px solid #e0e4ec;color:#555;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .15s;}
.dp-pill.active{background:#ff3008;color:#fff;border-color:#ff3008;}
.card-chart-label{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:4px 10px 0;background:#fafbfd;display:flex;align-items:center;gap:8px;}
.card-chart-label .leg{display:flex;align-items:center;gap:3px;font-size:8px;font-weight:700;letter-spacing:.04em;}
.card-chart-label .leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.card-chart svg{display:block;width:100%;overflow:visible;}

/* ── Rollup ── */
.rollup-wrap{display:flex;flex-direction:column;gap:14px;}
.chart-panel{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);padding:18px 20px;}
.chart-panel-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.chart-canvas-wrap{position:relative;height:220px;width:100%;}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.rollup-tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);}
.rollup-tbl th{background:#2d3a52;color:#b8c6e0;font-size:13px;padding:13px 16px;text-align:center;font-weight:700;letter-spacing:.04em;}
.rollup-tbl th:first-child{text-align:left;}
.rollup-tbl td{font-size:15px;padding:13px 16px;text-align:center;border-bottom:1px solid #f3f5f9;color:#222;font-weight:500;}
.rollup-tbl td.row-label{font-weight:800;text-align:left;color:#1e2330;background:#f8f9fb;font-size:12px;text-transform:uppercase;letter-spacing:.05em;width:120px;}
.rollup-tbl tr:last-child td{border-bottom:none;}
.rollup-tbl tr:nth-child(even) td:not(.row-label){background:#fafbfd;}
.rollup-tbl tr.highlight-row td{background:#fff8f7 !important;font-size:17px;font-weight:800;}
.rollup-tbl tr.highlight-row td.row-label{background:#fff0ee !important;color:#ff3008;font-size:12px;}


/* ── Rollup Hero KPIs ── */
.hero-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.hero-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);padding:18px 20px;}
.hero-card .h-val{font-size:28px;font-weight:800;color:#1e2330;letter-spacing:-.03em;line-height:1;}
.hero-card .h-lbl{font-size:10px;font-weight:700;color:#aab;text-transform:uppercase;letter-spacing:.08em;margin-top:6px;}
.hero-card .h-sub{font-size:11px;color:#888;margin-top:4px;}
.hero-card.red .h-val{color:#ff3008;}
.hero-card.navy .h-val{color:#1e2330;}
/* 3-col chart grid */
.chart-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.chart-canvas-wrap-tall{position:relative;height:260px;width:100%;}
/* Geo stacked chart */
.chart-panel-wide{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);padding:18px 20px;}
.chart-canvas-wrap-geo{position:relative;height:260px;width:100%;}
/* Top performers */
.top-performers{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);padding:18px 20px;}
.tp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px;}
.tp-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.tp-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#ff3008,#ff6b3d);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.tp-avatar img{width:44px;height:44px;border-radius:50%;object-fit:cover;}
.tp-name{font-size:10px;font-weight:700;color:#1e2330;text-align:center;line-height:1.3;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-val{font-size:13px;font-weight:800;color:#ff3008;}
.tp-bar-wrap{width:100%;height:5px;background:#f0f2f5;border-radius:3px;overflow:hidden;}
.tp-bar{height:5px;background:#ff3008;border-radius:3px;}
/* Rep card chart taller */
.card-chart svg{display:block;width:100%;overflow:visible;}

/* ── Detail Panel ── */
#detail-panel{position:fixed;right:-490px;top:0;width:470px;height:100vh;background:#fff;box-shadow:-6px 0 30px rgba(0,0,0,.12);transition:right .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:100;}
#detail-panel.open{right:0;}
.detail-header{background:linear-gradient(135deg,#1e2330 0%,#2a3352 100%);padding:18px 20px;}
.detail-header-top{display:flex;align-items:center;gap:12px;}
.detail-avatar{overflow:hidden;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff3008,#ff6b3d);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
.detail-name{font-size:16px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px;line-height:1.2;}
.detail-meta{font-size:11px;color:#8a9ab8;margin-top:3px;}
.period-badge{background:#ff3008;color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:10px;margin-top:10px;display:inline-block;letter-spacing:.04em;}
.detail-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
.close-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;margin-left:auto;flex-shrink:0;}
.close-btn:hover{background:rgba(255,255,255,.2);}
.detail-kpis{display:flex;padding:16px 20px;gap:10px;border-bottom:1px solid #f3f5f9;}
.dkpi{flex:1;text-align:center;padding:8px 4px;background:#f8f9fb;border-radius:8px;}
.dkpi-val{font-size:22px;font-weight:800;color:#1e2330;letter-spacing:-.02em;}
.dkpi-lbl{font-size:9px;color:#aab;margin-top:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
.detail-section{padding:14px 20px;}
.section-title{font-size:10px;font-weight:800;color:#aab;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.detail-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.detail-tbl th{background:#f5f7fb;padding:7px 10px;text-align:left;font-weight:700;color:#666;border-bottom:1px solid #e8ecf2;font-size:11px;}
.detail-tbl td{padding:7px 10px;border-bottom:1px solid #f3f5f9;color:#333;}
.detail-tbl tr:last-child td{border-bottom:none;}

</style>
</head>
<body><script>
(function(){
  var PW = "speedboat26";
  var KEY = "srep_auth";
  if(sessionStorage.getItem(KEY) === PW) return;
  // Build overlay
  var ov = document.createElement("div");
  ov.id = "pw-overlay";
  ov.style.cssText = "position:fixed;inset:0;background:#0f1420;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;";
  ov.innerHTML = `
    <div style="text-align:center;padding:40px;">
      <div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.5px;">Rep Productivity Tracker</div>
      <div style="font-size:13px;color:#8a9ab8;margin-bottom:32px;">2026 · DoorDash Sales</div>
      <input id="pw-input" type="password" placeholder="Enter password" autofocus
        style="width:260px;padding:12px 16px;border-radius:10px;border:1.5px solid #2d3650;background:#1e2330;color:#fff;font-size:15px;outline:none;display:block;margin:0 auto 12px;text-align:center;letter-spacing:.08em;"
      />
      <div id="pw-err" style="color:#ff6b6b;font-size:12px;min-height:18px;margin-bottom:12px;"></div>
      <button id="pw-btn"
        style="background:#ff3008;color:#fff;border:none;padding:12px 36px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;">
        ENTER
      </button>
    </div>
  `;
  document.body.prepend(ov);
  document.body.style.overflow = "hidden";
  function tryAuth(){
    var val = document.getElementById("pw-input").value;
    if(val === PW){
      sessionStorage.setItem(KEY, PW);
      document.getElementById("pw-overlay").remove();
      document.body.style.overflow = "";
    } else {
      var err = document.getElementById("pw-err");
      err.textContent = "Incorrect password — try again.";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }
  document.getElementById("pw-btn").addEventListener("click", tryAuth);
  document.getElementById("pw-input").addEventListener("keydown", function(e){ if(e.key==="Enter") tryAuth(); });
})();
</script>

function displayName(raw){
  var name=(raw||"").replace(/\s*-\s*Deactivated\s*/ig,"").trim();
  if(name.indexOf(",")!==-1){
    var parts=name.split(",");
    return parts[1].trim()+" "+parts[0].trim();
  }
  return name;
}

function geoEmoji(rep){
  var gs=(rep.geo_segment||rep.geo||"").toUpperCase();
  if(gs.indexOf("NAM")!==-1) return "\uD83C\uDDFA\uD83C\uDDF8";
  if(gs.indexOf("EMEA")!==-1||gs.indexOf("APAC")!==-1) return "\uD83C\uDF0D";
  return "";
}

function avatarHTML(rep, size){
  var url=SLACK_PHOTOS[rep.name||""];
  var ini=escH(initials(rep.name||""));
  if(url){
    return '<img class="rep-photo" src="'+url+'" alt="'+ini+'"/>';
  }
  return ini;
}

function filterReps(){
  return REPS.filter(function(r){
    if(F.geo!=="All" && r.geo!==F.geo) return false;
    if(F.seg!=="All" && r.segment!==F.seg) return false;
    if(F.role!=="All" && r.ae_am!==F.role) return false;
    if(F.fc!=="All" && r.facecard!==F.fc) return false;
    if(F.lvl!=="All" && r.level!==F.lvl) return false;
    if(F.mgr!=="All" && r.manager!==F.mgr) return false;
    if(F.rgn!=="All" && r.region!==F.rgn) return false;
    return true;
  });
}

function mkPill(key,val,label){
  var btn=document.createElement("button");
  btn.className="pill"; btn.textContent=label; btn.dataset.val=val;
  btn.addEventListener("click",function(){setFilter(key,val);});
  return btn;
}
function buildPills(id,key,vals){
  var c=document.getElementById(id); c.innerHTML="";
  c.appendChild(mkPill(key,"All","All"));
  var uniq=Array.from(new Set(vals)).filter(function(v){return v&&v!==""&&v.indexOf("#REF")<0&&v.indexOf("#N/A")<0&&v.indexOf("#ref")<0&&v.indexOf("#n/a")<0;}).sort();
  uniq.forEach(function(v){c.appendChild(mkPill(key,v,v));});
  updatePillActive(id,key);
}
function updatePillActive(id,key){
  var c=document.getElementById(id); if(!c) return;
  Array.from(c.querySelectorAll(".pill")).forEach(function(b){
    b.classList.toggle("active",b.dataset.val===F[key]);

}
function setFilter(key,val){

}
function setSort(s){

}
function renderView(){

}

/* ── Mini bar chart SVG for rep cards ── */
function miniBarSVG(rep){
  var range=ps(); var s=range[0], e=range[1];
  var tl=rep.timeline||[];
  var cwVals=[], moLabels=[];
  for(var i=s;i<=e;i++){
    cwVals.push((tl[i]&&tl[i].deals)||0);
    moLabels.push(MOS[i]?MOS[i].substring(0,3):"");
  }
  var maxCW=Math.max.apply(null,cwVals)||1;
  var n=cwVals.length;
  var NUMLH=10, LBLH=10, W=186, H=58;
  var chartH=H-NUMLH-LBLH;
  var gap=2;
  var barW=Math.max(4, Math.floor((W-(n-1)*gap)/n));
  var totalW=(barW+gap)*n-gap;
  var offsetX=Math.floor((W-totalW)/2);
  var svgParts="";
  for(var j=0;j<n;j++){
    var cw=cwVals[j];
    var barH=Math.max(cw>0?3:0, Math.round((cw/maxCW)*(chartH-2)));
    var bx=offsetX+j*(barW+gap);
    var by=NUMLH+(chartH-barH);
    svgParts+='<rect x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+barH+'" rx="1.5" fill="#ff3008" fill-opacity="'+(cw>0?'0.82':'0.10')+'"/>';
    /* number label above bar */
    if(cw>0){
      svgParts+='<text x="'+(bx+barW/2)+'" y="'+(by-2)+'" text-anchor="middle" font-size="6.5" font-weight="700" fill="#cc2200" font-family="-apple-system,sans-serif">'+Math.round(cw)+'</text>';
    }
    /* month label below */
    svgParts+='<text x="'+(bx+barW/2)+'" y="'+(H-1)+'" text-anchor="middle" font-size="6.5" fill="#bbb" font-family="-apple-system,sans-serif">'+moLabels[j]+'</text>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:58px;">'+svgParts+'</svg>';
}

  var g=document.getElementById("grid"); g.innerHTML="";

      +'<div class="card-meta">'+escH(rep.geo||"")+" · "+escH(rep.segment||"")+" · "+escH(rep.level||"")+'</div>'
      +'<div class="card-meta">'+escH(rep.manager||"")+'</div>'
      +'</div>'
      +'</div>'
      +'</div>'
      +'<div class="card-kpis">'
      +'<div class="kpi"><div class="kpi-val">'+fmtN(dv,1)+'</div><div class="kpi-lbl">Venues CW</div></div>'
      +'<div class="kpi"><div class="kpi-val">'+fmtM(mv)+'</div><div class="kpi-lbl">MRR Won</div></div>'
      +'</div>'

    g.appendChild(card);
  });
  document.getElementById("count-label").textContent=sorted.length+" reps";
}

/* ── Headcount / GeoTotals helpers ── */
function hcForMonth(mi){
  var total=0;
  Object.keys(D_HC).forEach(function(gsKey){
    var parts=gsKey.split(" "); var geo=parts[0], seg=parts.slice(1).join(" ");
    if(F.geo!=="All" && geo!==F.geo) return;
    if(F.seg!=="All" && seg!==F.seg) return;
    var v=D_HC[gsKey][MKS[mi]]; if(v) total+=v;
  });
  return total;
}
function getGeoTotalsForMonth(mi){
  var totalVenues=0, totalMRR=0;
  Object.keys(GEO_TOT).forEach(function(gsKey){
    var parts=gsKey.split(" "); var geo=parts[0], seg=parts.slice(1).join(" ");
    if(F.geo!=="All" && geo!==F.geo) return;
    if(F.seg!=="All" && seg!==F.seg) return;
    var entry=GEO_TOT[gsKey][mi];
    if(entry){totalVenues+=entry.deals||0; totalMRR+=entry.mrr||0;}
  });
  return {venues:totalVenues, mrr:totalMRR};
}

/* ── Rollup ── */
function destroyCharts(){
  if(rollupChartA){rollupChartA.destroy();rollupChartA=null;}
  if(rollupChartB){rollupChartB.destroy();rollupChartB=null;}
  if(rollupChartC){rollupChartC.destroy();rollupChartC=null;}
  if(rollupChartD){rollupChartD.destroy();rollupChartD=null;}
  if(rollupChartGeo){rollupChartGeo.destroy();rollupChartGeo=null;}
}

function renderRollup(){
  var fields=mf();
  var range=ps(); var s=range[0], e=range[1];
  var reps=filterReps();
  var g=document.getElementById("grid"); g.innerHTML="";
  g.style.display="block";
  destroyCharts();

  /* ── Aggregate data ── */
  var labels=[], venues=[], mrrs=[], hcs=[], vhcs=[];
  for(var mi=s;mi<=e;mi++){
    var gt=getGeoTotalsForMonth(mi);
    var hc=hcForMonth(mi);
    labels.push(MOS[mi]);
    venues.push(Math.round(gt.venues*10)/10);
    mrrs.push(Math.round(gt.mrr));
    hcs.push(Math.round(hc*10)/10);
    vhcs.push(hc>0?Math.round(gt.venues/hc*100)/100:0);
  }
  var totalVenues=venues.reduce(function(a,b){return a+b;},0);
  var totalMRR=mrrs.reduce(function(a,b){return a+b;},0);
  var avgVHC=vhcs.length?vhcs.reduce(function(a,b){return a+b;},0)/vhcs.filter(function(v){return v>0;}).length:0;
  var lastHC=hcs[hcs.length-1]||0;
  var activeReps=reps.filter(function(r){return r.ae_am!=="-";}).length;

  /* ── Geo breakdown ── */
  var GEO_COLORS={
    "NAM SMB":"rgba(255,48,8,.80)",
    "NAM Strategic":"rgba(255,48,8,.45)",
    "EMEA SMB":"rgba(99,102,241,.80)",
    "EMEA Strategic":"rgba(99,102,241,.38)",
    "APAC SMB":"rgba(0,150,100,.75)",
    "APAC Strategic":"rgba(0,150,100,.40)"
  };
  var geoSegKeys=Object.keys(GEO_TOT).filter(function(gs){
    var parts=gs.split(" "); var geo=parts[0], seg=parts.slice(1).join(" ");
    if(F.geo!=="All"&&geo!==F.geo) return false;
    if(F.seg!=="All"&&seg!==F.seg) return false;
    return true;
  }).sort();
  var geoDatasets=geoSegKeys.map(function(gs){
    var data=[];
    for(var mi=s;mi<=e;mi++){
      var entry=GEO_TOT[gs]&&GEO_TOT[gs][mi];
      data.push(entry?Math.round(entry.deals*10)/10:0);
    }
    return {label:gs,data:data,backgroundColor:GEO_COLORS[gs]||"rgba(120,120,120,.6)",borderRadius:3,borderSkipped:false};
  });

  /* ── Top 5 reps ── */
  var sorted5=reps.slice().sort(function(a,b){return (b[fields.d]||0)-(a[fields.d]||0);}).slice(0,10);
  var maxCW=sorted5.length?sorted5[0][fields.d]||1:1;

  /* ── Build DOM ── */
  var wrap=document.createElement("div");
  wrap.className="rollup-wrap";

  /* ── Hero KPI cards ── */
  function heroCard(val,lbl,sub,cls){
    return '<div class="hero-card'+(cls?' '+cls:'')+'"><div class="h-val">'+val+'</div><div class="h-lbl">'+lbl+'</div>'+(sub?'<div class="h-sub">'+sub+'</div>':'')+'</div>';
  }
  var heroDiv=document.createElement("div");
  heroDiv.className="hero-kpis";
  /* MoM trend helper */
  var lastV=venues[venues.length-1]||0, prevV=venues[venues.length-2]||0;
  var momArrow=prevV>0?(lastV>=prevV?"▲ ":"▼ ")+Math.abs(Math.round((lastV-prevV)/prevV*100))+"%":"—";
  var lastMRR=mrrs[mrrs.length-1]||0, prevMRR=mrrs[mrrs.length-2]||0;
  var momMRR=prevMRR>0?(lastMRR>=prevMRR?"▲ ":"▼ ")+Math.abs(Math.round((lastMRR-prevMRR)/prevMRR*100))+"%":"—";
  heroDiv.innerHTML=
    heroCard(Math.round(totalVenues).toLocaleString(),"Total Venues CW","MoM latest: "+momArrow,"red")+
    heroCard(fmtM(totalMRR),"Total MRR Won","MoM latest: "+momMRR,"navy")+
    heroCard(avgVHC.toFixed(2),"Avg Venues / HC","Per headcount efficiency","")+
    heroCard(activeReps+" reps","Active Reps","HC "+lastHC.toFixed(1)+" (latest)","");
  wrap.appendChild(heroDiv);

  /* ── 3-chart row: Venues CW · MRR Won · Venues/HC ── */
  var chartRow3=document.createElement("div");
  chartRow3.className="chart-row-3";
  function makePanel(id, title){
    var p=document.createElement("div"); p.className="chart-panel";
    p.innerHTML='<div class="chart-panel-title">'+title+'</div><div class="chart-canvas-wrap-tall"><canvas id="'+id+'"></canvas></div>';
    return p;
  }
  chartRow3.appendChild(makePanel("rc-a","Venues Closed Won"));
  chartRow3.appendChild(makePanel("rc-b","MRR Won"));
  chartRow3.appendChild(makePanel("rc-c","Venues / Headcount"));
  wrap.appendChild(chartRow3);

  /* ── Geo stacked chart ── */
  var geoPanel=document.createElement("div");
  geoPanel.className="chart-panel-wide";
  geoPanel.innerHTML='<div class="chart-panel-title">Venues CW by Segment</div><div class="chart-canvas-wrap-geo"><canvas id="rc-geo"></canvas></div>';
  wrap.appendChild(geoPanel);

  /* ── Top Performers ── */
  var tpDiv=document.createElement("div");
  tpDiv.className="top-performers";
  tpDiv.innerHTML='<div class="chart-panel-title">Top Performers — '+escH(fields.n)+'</div><div class="tp-grid" id="tp-grid"></div>';
  wrap.appendChild(tpDiv);

  /* ── Data table ── */
  var tbl=document.createElement("table");
  tbl.className="rollup-tbl";
  var thead=document.createElement("thead");
  var hrow=document.createElement("tr");
  var th0=document.createElement("th"); th0.textContent="Metric"; hrow.appendChild(th0);
  labels.forEach(function(l){var th=document.createElement("th");th.textContent=l;hrow.appendChild(th);});
  thead.appendChild(hrow); tbl.appendChild(thead);
  var tbody=document.createElement("tbody");
  function addRow(label,vals,fmt,cls){
    var tr=document.createElement("tr"); if(cls) tr.className=cls;
    var td0=document.createElement("td"); td0.className="row-label"; td0.textContent=label; tr.appendChild(td0);
    vals.forEach(function(v){var td=document.createElement("td");td.textContent=fmt(v);tr.appendChild(td);});
    tbody.appendChild(tr);
  }
  addRow("Venues CW",   venues, function(v){return fmtN(v,0);});
  addRow("MRR Won",     mrrs,   fmtM);
  addRow("Headcount",   hcs,    function(v){return fmtN(v,1);});
  addRow("Venues / HC", vhcs,   function(v){return fmtN(v,1);}, "highlight-row");
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);

  g.appendChild(wrap);
  document.getElementById("count-label").textContent=reps.length+" reps · "+fields.n;

  /* ── Inline data-label plugin ── */
  var dataLabelPlugin={
    id:"dataLabels",
    afterDatasetsDraw:function(chart){
      var ctx=chart.ctx;
      chart.data.datasets.forEach(function(dataset,i){
        var meta=chart.getDatasetMeta(i);
        meta.data.forEach(function(bar,j){
          var val=dataset.data[j];
          if(val===null||val===undefined||val===0) return;
          var label=dataset._labelFmt?dataset._labelFmt(val):String(val);
          ctx.save();
          ctx.font="bold 11px -apple-system,sans-serif";
          ctx.fillStyle="#333";
          ctx.textAlign="center";
          ctx.textBaseline="bottom";
          ctx.fillText(label, bar.x, bar.y-4);
          ctx.restore();
        });
      });
    }
  };

  requestAnimationFrame(function(){
    var ctxA=document.getElementById("rc-a");
    var ctxB=document.getElementById("rc-b");
    var ctxC=document.getElementById("rc-c");
    var ctxGeo=document.getElementById("rc-geo");
    if(!ctxA||!ctxB||!ctxC) return;

    var commonOpts={responsive:true,maintainAspectRatio:false,animation:{duration:400},
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:"#999"}},
        y:{grid:{color:"#f3f5f9"},ticks:{font:{size:10},color:"#999"},beginAtZero:true}
      }
    };

    /* Chart A: Venues CW */
    rollupChartA=new Chart(ctxA,{type:"bar",plugins:[dataLabelPlugin],
      data:{labels:labels,datasets:[{
        label:"Venues CW",data:venues,
        _labelFmt:function(v){return Math.round(v);},
        backgroundColor:"rgba(255,48,8,.75)",hoverBackgroundColor:"rgba(255,48,8,1)",
        borderRadius:5,borderSkipped:false
      }]},
      options:Object.assign({},commonOpts,{plugins:{legend:{display:false},
        tooltip:{callbacks:{label:function(c){return " "+c.raw+" venues";}}}
      }})
    });

    /* Chart B: MRR Won */
    rollupChartB=new Chart(ctxB,{type:"bar",plugins:[dataLabelPlugin],
      data:{labels:labels,datasets:[{
        label:"MRR Won",data:mrrs,
        _labelFmt:function(v){return fmtM(v);},
        backgroundColor:"rgba(59,110,182,.75)",hoverBackgroundColor:"rgba(59,110,182,1)",
        borderRadius:5,borderSkipped:false
      }]},
      options:Object.assign({},commonOpts,{plugins:{legend:{display:false},
        tooltip:{callbacks:{label:function(c){return " "+fmtM(c.raw);}}}
      },scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:"#999"}},
        y:{grid:{color:"#f3f5f9"},ticks:{font:{size:10},color:"#999",callback:function(v){return fmtM(v);}},beginAtZero:true}
      }})
    });

    /* Chart C: Venues/HC */
    rollupChartC=new Chart(ctxC,{type:"bar",plugins:[dataLabelPlugin],
      data:{labels:labels,datasets:[{
        label:"Venues/HC",data:vhcs,
        _labelFmt:function(v){return v.toFixed(1);},
        backgroundColor:"rgba(0,130,200,.65)",hoverBackgroundColor:"rgba(0,130,200,1)",
        borderRadius:5,borderSkipped:false
      }]},
      options:Object.assign({},commonOpts,{plugins:{legend:{display:false},
        tooltip:{callbacks:{label:function(c){return " "+c.raw.toFixed(2)+" per HC";}}}
      }})
    });

    /* Chart Geo: Stacked bars by segment */
    if(ctxGeo && geoDatasets.length){
      rollupChartGeo=new Chart(ctxGeo,{type:"bar",
        data:{labels:labels,datasets:geoDatasets},
        options:{
          responsive:true,maintainAspectRatio:false,animation:{duration:400},
          plugins:{
            legend:{display:true,position:"top",labels:{font:{size:10},padding:12,
              usePointStyle:true,pointStyle:"circle"}},
            tooltip:{mode:"index",callbacks:{label:function(c){return " "+c.dataset.label+": "+Math.round(c.raw);}}}
          },
          scales:{
            x:{stacked:true,grid:{display:false},ticks:{font:{size:10},color:"#999"}},
            y:{stacked:true,grid:{color:"#f3f5f9"},ticks:{font:{size:10},color:"#999"},beginAtZero:true}
          }
        }
      });
    }

    /* Top performers avatars */
    var tpGrid=document.getElementById("tp-grid");
    if(tpGrid){
      sorted5.forEach(function(rep){
        var val=rep[fields.d]||0;
        var pct=Math.round(val/maxCW*100);
        var dname=displayName(rep.name||"");
        var firstName=dname.split(" ")[0];
        var photoUrl=SLACK_PHOTOS[rep.name||""];
        var tp_ini=escH(((dname.split(" ")[0]||"")[0]||"")+(dname.split(" ")[1]?(dname.split(" ")[1][0]||""):"")).toUpperCase();
        var avatarEl=photoUrl?'<img class="rep-photo" src="'+photoUrl+'" alt="'+tp_ini+'"/>':tp_ini;
        var item=document.createElement("div");
        item.className="tp-item";
        item.innerHTML=
          '<div class="tp-avatar">'+avatarEl+'</div>'+
          '<div class="tp-name" title="'+escH(dname)+'">'+escH(firstName)+'</div>'+
          '<div class="tp-val">'+fmtN(val,1)+'</div>'+
          '<div class="tp-bar-wrap"><div class="tp-bar" style="width:'+pct+'%"></div></div>';
        tpGrid.appendChild(item);
      });
    }
  });
}

function toggleView(){
  if(view==="grid"){
    view="rollup";
    document.getElementById("toggle-btn").textContent="← Cards";
    renderRollup();
  } else {
    view="grid";
    document.getElementById("toggle-btn").textContent="📊 Rollup";
    destroyCharts();
    renderGrid(filterReps());
  }
}


function detailBarSVG(vals, moLabels, color, fmtFn){
  var maxV=Math.max.apply(null,vals.map(function(v){return Math.abs(v);}))||1;
  var n=vals.length;
  var NUMLH=13, LBLH=12, W=430, H=90;
  var chartH=H-NUMLH-LBLH;
  var gap=3;
  var barW=Math.max(6, Math.floor((W-(n-1)*gap)/n));
  var totalW=(barW+gap)*n-gap;
  var offsetX=Math.floor((W-totalW)/2);
  var svgParts="";
  for(var j=0;j<n;j++){
    var v=vals[j];
    var barH=Math.max(v>0?3:0, Math.round((v/maxV)*(chartH-2)));
    var bx=offsetX+j*(barW+gap);
    var by=NUMLH+(chartH-barH);
    svgParts+='<rect x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+barH+'" rx="2" fill="'+color+'" fill-opacity="'+(v>0?'0.80':'0.08')+'"/>';
    if(v>0){
      var lbl=fmtFn(v);
      svgParts+='<text x="'+(bx+barW/2)+'" y="'+(by-3)+'" text-anchor="middle" font-size="8.5" font-weight="700" fill="'+color+'" font-family="-apple-system,sans-serif">'+lbl+'</text>';
    }
    svgParts+='<text x="'+(bx+barW/2)+'" y="'+(H-1)+'" text-anchor="middle" font-size="8" fill="#999" font-family="-apple-system,sans-serif">'+moLabels[j]+'</text>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px;display:block;">'+svgParts+'</svg>';
}

var _detailRep=null;

function openDetail(rep){
  _detailRep=rep;
  renderDetail();
  document.getElementById("detail-panel").classList.add("open");
}

function renderDetail(){
  var rep=_detailRep; if(!rep) return;
  var fields=mf();
  var dv=rep[fields.d]||0, mv=rep[fields.m]||0, dv25=rep.deals_2025||0;
  var range=ps(); var s=range[0], e=range[1];
  var tl=rep.timeline||[];
  var panel=document.getElementById("detail-panel");
  var dname=displayName(rep.name||"");
  var geo_em=geoEmoji(rep);

  var tlRows="", cwChart=[], mrrChart=[], moChart=[];
  for(var i=s;i<=e;i++){
    var row=tl[i]||{};
    cwChart.push(row.deals||0);
    mrrChart.push(row.mrr||0);
    moChart.push(MOS[i]?MOS[i].substring(0,3):"");
    tlRows+="<tr><td>"+escH(MOS[i])+"</td><td>"+(row.deals||0).toFixed(1)+"</td><td>"+fmtM(row.mrr||0)+"</td></tr>";
  }

  var srcRows="";
  var bsd=rep.by_source||{}, bsm=rep.by_source_mrr||{};
  Object.keys(bsd).sort(function(a,b){return (bsd[b]||0)-(bsd[a]||0);}).slice(0,8).forEach(function(src){
    srcRows+="<tr><td>"+escH(src)+"</td><td>"+(bsd[src]||0).toFixed(1)+"</td><td>"+fmtM(bsm[src]||0)+"</td></tr>";
  });

  var fc=rep.facecard==="Yes"?'<span class="fc-badge" style="font-size:9px;">FC</span>':"";
  panel.innerHTML=
    '<div class="detail-header">'
    +'<div class="detail-header-top">'
    +'<div class="detail-avatar">'+avatarHTML(rep,56)+'</div>'
    +'<div style="flex:1;min-width:0;">'
    +'<div class="detail-name"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escH(dname)+'</span>'+fc+' <span style="font-size:16px;">'+geo_em+'</span></div>'
    +'<div class="detail-meta">'+escH(rep.geo||"")+" · "+escH(rep.segment||"")+" · "+escH(rep.level||"")+"</div>"
    +'<div class="detail-meta">Mgr: '+escH(rep.manager||"")+"</div>"
    +'</div>'
    +'<button class="close-btn" onclick="closeDetail()">&#x2715;</button>'
    +'</div>'
    +'</div>'
    +'<div class="detail-period-bar" id="detail-period-bar"></div>'
    +'<div class="detail-kpis">'
    +'<div class="dkpi"><div class="dkpi-val">'+fmtN(dv,1)+'</div><div class="dkpi-lbl">Venues CW</div></div>'
    +'<div class="dkpi"><div class="dkpi-val">'+fmtM(mv)+'</div><div class="dkpi-lbl">MRR Won</div></div>'
    +'<div class="dkpi"><div class="dkpi-val">'+fmtN(dv25,1)+'</div><div class="dkpi-lbl">2025</div></div>'
    +'</div>'
    +'<div class="detail-section">'
    +'<div class="section-title" style="margin-bottom:6px;">Venues CW — '+escH(fields.n)+'</div>'
    +detailBarSVG(cwChart,moChart,'#ff3008',function(v){return Math.round(v);})
    +'</div>'
    +'<div class="detail-section" style="padding-top:4px;">'
    +'<div class="section-title" style="margin-bottom:6px;">MRR Won — '+escH(fields.n)+'</div>'
    +detailBarSVG(mrrChart,moChart,'#1e2330',fmtM)
    +'</div>'
    +'<div class="detail-section"><div class="section-title">Monthly Detail</div>'
    +'<table class="detail-tbl"><thead><tr><th>Month</th><th>Venues CW</th><th>MRR Won</th></tr></thead>'
    +'<tbody>'+tlRows+'</tbody></table></div>'
    +(srcRows?'<div class="detail-section"><div class="section-title">By Source</div>'
    +'<table class="detail-tbl"><thead><tr><th>Source</th><th>Venues</th><th>MRR</th></tr></thead>'
    +'<tbody>'+srcRows+'</tbody></table></div>':"")
    +'</div>';

  /* Build period pills inside the detail panel */
  var bar=document.getElementById("detail-period-bar");
  [["ytd","YTD"],["q1","Q1"],["l3m","Last 3M"]].forEach(function(pair){
    var btn=document.createElement("button");
    btn.className="dp-pill"+(period===pair[0]?" active":"");
    btn.textContent=pair[1];
    btn.addEventListener("click",function(){
      period=pair[0];
      /* also sync the topbar pills */
      document.querySelectorAll(".period-pill").forEach(function(b){b.classList.toggle("active",b.dataset.period===period);});
      renderDetail();
    });
    bar.appendChild(btn);
  });
}

function closeDetail(){
  _detailRep=null;
  document.getElementById("detail-panel").classList.remove("open");
}

document.addEventListener("error",function(e){
  if(e.target&&e.target.classList&&e.target.classList.contains("rep-photo")){
    var ini=e.target.alt||"?";
    e.target.style.display="none";
    e.target.parentNode.textContent=ini;
  }
},true);

window.addEventListener("DOMContentLoaded",function(){
  buildPills("geo-pills",  "geo",  REPS.map(function(r){return r.geo;}));
  buildPills("seg-pills",  "seg",  REPS.map(function(r){return r.segment;}));

  buildPills("lvl-pills",  "lvl",  REPS.map(function(r){return r.level;}));
  buildPills("mgr-pills",  "mgr",  REPS.map(function(r){return r.manager;}));
  buildPills("rgn-pills",  "rgn",  REPS.map(function(r){return r.region;}));
  document.querySelectorAll(".sort-btn").forEach(function(b){
    b.addEventListener("click",function(){setSort(b.dataset.sort);});
  });

    b.addEventListener("click",function(){setPeriod(b.dataset.period);});
  });
  document.getElementById("toggle-btn").addEventListener("click",toggleView);
  renderGrid(filterReps());
});

</script>
